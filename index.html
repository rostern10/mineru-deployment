<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>文档智析</title>
<script src="/marked.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif;background:#f8f9fa;color:#1a1d23;height:100vh;display:flex;overflow:hidden}
#login-box{position:fixed;inset:0;background:#fff;display:flex;align-items:center;justify-content:center;z-index:999;flex-direction:column;gap:40px}
.login-brand{display:flex;align-items:center;gap:12px;font-size:26px;font-weight:600;color:#111;letter-spacing:-0.5px}
.login-brand svg{width:34px;height:34px;color:#111}
.login-card{border:none;box-shadow:none;padding:0;width:340px}
.login-card h1{font-size:26px;font-weight:700;color:#111;margin-bottom:4px;letter-spacing:-1px}
.login-card p{color:#999;font-size:14px;margin-bottom:28px}
.login-card label{display:block;font-size:12px;font-weight:500;color:#666;margin-bottom:6px;text-transform:uppercase;letter-spacing:1px}
.login-card input{width:100%;padding:12px 0;background:transparent;border:none;border-bottom:1px solid #e5e5e5;color:#111;font-size:16px;outline:none;margin-bottom:20px;transition:border .2s;border-radius:0}
.login-card input:focus{border-bottom-color:#111}
.login-card input::placeholder{color:#ccc}
.login-card button{width:100%;padding:14px;background:#111;color:#fff;border:none;cursor:pointer;font-size:14px;font-weight:500;letter-spacing:1px;transition:opacity .2s;margin-top:8px}
.login-card button:hover{opacity:.85}
.login-err{color:#e00;font-size:12px;margin-top:12px;display:none;text-align:center}
#app-box{display:none;width:100%;height:100%}
#app-box.on{display:flex}
.sidebar{width:260px;min-width:160px;background:#fff;border-right:1px solid #e5e7eb;display:flex;flex-direction:column;overflow:hidden}
.resizer{width:5px;cursor:col-resize;background:transparent;transition:background .15s;position:relative;flex-shrink:0}
.resizer:hover,.resizer.active{background:#6366f1}
.resizer::after{content:'';position:absolute;top:0;bottom:0;left:-3px;right:-3px}
.sidebar-top{padding:16px 20px;display:flex;align-items:center;justify-content:space-between}
.sidebar-top h2{font-size:16px;font-weight:700;color:#1a1d23}
.sidebar-top button{display:flex;align-items:center;justify-content:center;width:32px;height:32px;border-radius:8px;border:1px solid #e5e7eb;background:#fff;cursor:pointer;font-size:18px;color:#6b7280;transition:all .15s}
.sidebar-top button:hover{background:#f3f4f6;color:#374151;border-color:#d1d5db}
.conv-list{flex:1;overflow-y:auto;padding:8px 12px}
.conv-item{padding:10px 12px;border-radius:8px;cursor:pointer;font-size:13px;color:#6b7280;margin-bottom:2px;display:flex;justify-content:space-between;align-items:center;transition:all .1s}
.conv-item:hover{background:#f3f4f6;color:#374151}
.conv-item.active{background:#f5f5f5;color:#111;font-weight:500}
.conv-item span{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1}
.conv-item .del{visibility:hidden;color:#9ca3af;font-size:16px;cursor:pointer;padding:0 4px;border-radius:4px}
.conv-item .del:hover{color:#ef4444;background:#fef2f2}
.conv-item:hover .del{visibility:visible}
.sidebar-foot{padding:12px 20px;border-top:1px solid #e5e7eb;font-size:13px;color:#6b7280;display:flex;justify-content:space-between;align-items:center}
.sidebar-foot button{background:none;border:none;color:#9ca3af;cursor:pointer;font-size:12px;padding:4px 8px;border-radius:6px}
.sidebar-foot button:hover{color:#ef4444;background:#fef2f2}
.main{flex:1;display:flex;flex-direction:column;min-width:0;background:#fff}
.main-top{padding:12px 24px;border-bottom:1px solid #f3f4f6;font-size:15px;font-weight:600;color:#1a1d23;height:50px;display:flex;align-items:center}
.chat-wrapper{flex:1;overflow-y:auto;padding:24px 36px 24px 24px;position:relative}
.chat-dots{position:absolute;right:4px;top:0;width:12px;display:flex;flex-direction:column;align-items:center;gap:3px;padding-top:24px;z-index:2}
.chat-dots .dot{width:7px;height:7px;border-radius:50%;background:#d1d5db;cursor:pointer;flex-shrink:0;transition:all .12s}
.chat-dots .dot:hover{background:#6366f1;transform:scale(1.6)}
.chat-dots .dot:hover::after{content:attr(data-pv);position:absolute;right:18px;top:50%;transform:translateY(-50%);background:#1a1d23;color:#fff;padding:3px 8px;border-radius:4px;font-size:10px;white-space:nowrap;max-width:140px;overflow:hidden;text-overflow:ellipsis;pointer-events:none;z-index:99}
.msgs{max-width:820px;margin:0 auto;display:flex;flex-direction:column}
.msg{display:flex;gap:14px;padding:16px 20px;margin:0 -20px;border-bottom:1px solid #f3f4f6;position:relative}
.msg.user{background:transparent;justify-content:flex-end;padding:8px 20px}
.msg.user .av{display:none}
.msg.assistant .av{display:none}
.msg.user .b{text-align:left;color:#1a1d23;max-width:80%;background:#e8f3ff;padding:10px 14px;border-radius:12px;border:none;font-size:14px;line-height:1.65}
.msg.assistant{padding:16px 20px}
.msg.assistant .b{max-width:65%;line-height:1.7;color:#333;font-size:14px}
.msg.assistant .b h1,.msg.assistant .b h2,.msg.assistant .b h3,.msg.assistant .b h4{font-weight:600;margin:16px 0 8px;color:#1a1d23}
.msg.assistant .b h1{font-size:20px}.msg.assistant .b h2{font-size:17px}.msg.assistant .b h3{font-size:15px}.msg.assistant .b h4{font-size:14px}
.msg.assistant .b p{margin:4px 0;line-height:1.7}
.msg.assistant .b ul,.msg.assistant .b ol{padding-left:22px;margin:8px 0;list-style-type:disc}
.msg.assistant .b ol{list-style-type:decimal}
.msg.assistant .b li{margin:3px 0;display:list-item}
.msg.assistant .b strong{font-weight:600;color:#1a1d23}
.msg.assistant .b table{border-collapse:collapse;width:100%;margin:10px 0;font-size:13px}
.msg.assistant .b td,.msg.assistant .b th{border:1px solid #e5e7eb;padding:6px 10px;text-align:left}
.msg.assistant .b th{background:#f5f5f5;font-weight:600}
.empty-state{text-align:center;padding:60px 20px;color:#d1d5db}
.empty-state .icon{font-size:48px;margin-bottom:12px;opacity:.4}
.input-area{padding:16px 24px;border-top:1px solid #f3f4f6;background:#fff}
.input-row{max-width:820px;margin:0 auto;display:flex;gap:10px;align-items:flex-end;background:#f8f9fa;border:1px solid #e5e7eb;border-radius:12px;padding:6px 8px;transition:border .2s}
.input-row:focus-within{border-color:#111;box-shadow:0 0 0 3px rgba(0,0,0,.06)}
.input-row textarea{flex:1;background:transparent;border:none;padding:6px 8px;color:#1a1d23;font-size:14px;resize:none;min-height:24px;max-height:150px;outline:none;font-family:inherit;line-height:1.5}
.input-row textarea::placeholder{color:#9ca3af}
.input-row button{padding:8px 18px;background:#111;color:#fff;border:none;border-radius:8px;cursor:pointer;font-size:13px;font-weight:500;white-space:nowrap;transition:background .2s;margin-bottom:2px}
.input-row button:hover:not(:disabled){background:#333}
.input-row button:disabled{opacity:.4;cursor:default}
.right{width:320px;min-width:220px;background:#fff;border-left:1px solid #e5e7eb;display:flex;flex-direction:column;font-size:13px;overflow:hidden}
.right h3{padding:14px 18px;border-bottom:1px solid #f3f4f6;color:#374151;font-size:14px;font-weight:600;display:flex;align-items:center;gap:8px}
.up{padding:20px 18px 14px}
.up-box{border:2px dashed #d1d5db;border-radius:10px;padding:36px 14px;text-align:center;cursor:pointer;color:#9ca3af;transition:all .2s;font-size:14px;background:#fafbfc;min-height:80px;display:flex;align-items:center;justify-content:center}
.up-box:hover{border-color:#111;color:#111;background:#f5f5f5}
.up-box.done{border-color:#22c55e;background:#f0fdf4;color:#16a34a;cursor:default}
.up-status{font-size:12px;color:#9ca3af;margin-top:8px;min-height:18px}
.up-preview{flex:1;overflow-y:auto;padding:12px 18px;white-space:pre-wrap;word-break:break-word;display:none;line-height:1.65;background:#fafbfc;margin:0 12px 12px;border-radius:8px;font-size:12px;color:#374151;border:1px solid #f3f4f6;max-height:calc(100vh - 300px)}
.up-preview table{border-collapse:collapse;width:100%;margin:8px 0;font-size:11px}
.up-preview td,.up-preview th{border:1px solid #d1d5db;padding:4px 8px}
.up-preview th{background:#f0f0f0;font-weight:600}
.up-preview.on{display:block}
.up-btns{padding:8px 18px;display:none;gap:8px}
.up-btns.on{display:flex}
.up-btns button{padding:7px 14px;background:#fff;border:1px solid #e5e7eb;color:#374151;border-radius:6px;cursor:pointer;font-size:12px;transition:all .15s}
.up-btns button:hover{background:#f3f4f6;border-color:#d1d5db}
input[type=file]{display:none}
</style>
</head>
<body>
<div id="login-box">
  <div class="login-brand">
    <svg viewBox="0 0 24 24" fill="none" stroke="#6366f1" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="3"/><line x1="8" y1="8" x2="16" y2="8"/><line x1="8" y1="12" x2="16" y2="12"/><line x1="8" y1="16" x2="12" y2="16"/></svg>
    文档智析
  </div>
  <div class="login-card">
    <h1>登录</h1>
    <p>智能文档解析与问答平台</p>
    <label>用户名</label>
    <input id="lu" placeholder="输入用户名" autocomplete="username">
    <label>密码</label>
    <input id="lp" type="password" placeholder="输入密码" onkeydown="if(event.key==='Enter')doLogin()">
    <button onclick="doLogin()">登 录</button>
    <div class="login-err" id="le">用户名或密码错误</div>
  </div>
</div>
<div id="app-box">
  <div class="sidebar">
    <div class="sidebar-top"><h2>文档智析</h2><button onclick="newConv()" title="新对话">+</button></div>
    <div class="conv-list" id="clist"></div>
    <div class="sidebar-foot"><span id="uinfo"></span><span id="adminLink" style="display:none"><a href="/admin" style="color:#07c160;text-decoration:none;font-size:13px">管理</a></span><button onclick="logout()">退出登录</button></div>
  </div>
  <div class="resizer" id="resizer1"></div>
  <div class="main">
    <div class="main-top" id="ctitle">新对话</div>
    <div class="chat-wrapper"><div class="msgs" id="msgs"><div class="empty-state"><div class="icon">💡</div><div>选择或创建对话开始</div></div></div><div class="chat-dots" id="chatDots"></div></div>
    <div class="input-area"><div class="input-row">
      <textarea id="cin" placeholder="输入消息..." rows="1" onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();send()}"></textarea>
      <button id="sbtn" onclick="send()" disabled>发送</button>
    </div></div>
  </div>
  <div class="resizer" id="resizer2"></div>
  <div class="right">
    <h3>📄 文档解析</h3>
    <div class="up">
      <input type="file" id="fi" accept=".pdf,.docx,.xlsx,.pptx">
      <label for="fi" class="up-box" id="ubox">点击或拖拽上传文档</label>
      <div class="up-status" id="ust"></div>
    </div>
    <div class="up-btns" id="ubtns">
      <button onclick="downMd()">⬇ 下载 .md</button>
      <button onclick="downZip()">📦 下载 ZIP（含图片）</button>
      <button onclick="copyMd()">📋 复制全文</button>
    </div>
    <div class="up-preview" id="upv"></div>
  </div>
</div>
<script>
var T='',U=null,C=null,cs=[],md='',docCid='',poll=null,lastJobId=localStorage.getItem('lastJobId')||'';
var A='/api';
if(T=localStorage.getItem('mt'))chk();

async function chk(){
  try{var r=await fetch(A+'/me',{headers:{'Authorization':'Bearer '+T}});if(!r.ok)throw 0;U=await r.json();show()}catch(e){T='';localStorage.removeItem('mt')}
}
async function doLogin(){
  var u=document.getElementById('lu').value.trim(),p=document.getElementById('lp').value;
  try{var r=await fetch(A+'/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username:u,password:p})});var d=await r.json();if(!r.ok){document.getElementById('le').style.display='block';return}T=d.token;U={user_id:d.user_id,username:d.username,display_name:d.display_name};localStorage.setItem('mt',T);show()}catch(e){document.getElementById('le').style.display='block'}
}
function logout(){T='';U=null;C=null;cs=[];md='';docCid='';localStorage.removeItem('mt');document.getElementById('login-box').style.display='flex';document.getElementById('app-box').style.display='none';document.getElementById('msgs').innerHTML='';document.getElementById('clist').innerHTML='';document.getElementById('upv').innerHTML='<div class="up-box" onclick="document.getElementById(\"finput\").click()"><span>📤 点击或拖拽上传文件</span><br><small>支持PDF/图片/Office</small></div>';document.getElementById('ubtns').classList.remove('on');document.getElementById('upv').classList.remove('on');document.getElementById('ust').textContent='';document.getElementById('adminLink').style.display='none'}
function show(){document.getElementById('login-box').style.display='none';document.getElementById('app-box').style.display='flex';document.getElementById('uinfo').textContent='👤 '+U.display_name;if(U.username==='admin')document.getElementById('adminLink').style.display='inline';document.getElementById('ctitle').innerHTML='<span>新对话</span>';document.getElementById('msgs').innerHTML='<div class="empty-state"><div class="icon">💡</div><div>选择或创建对话</div></div>';loadCs()}
async function loadCs(){var r=await fetch(A+'/conversations',{headers:{'Authorization':'Bearer '+T}});cs=await r.json();renderCs()}
function renderCs(){document.getElementById('clist').innerHTML=cs.map(function(c){return'<div class="conv-item'+(c.id===C?' active':'')+'" onclick="openC(\''+c.id+'\')"><span>'+esc(c.title)+'</span><span class="del" onclick="event.stopPropagation();delC(\''+c.id+'\')">×</span></div>'}).join('')}
async function newConv(){var r=await fetch(A+'/conversations',{method:'POST',headers:{'Authorization':'Bearer '+T}});var c=await r.json();cs.unshift(c);openC(c.id)}
function openC(id){C=id;renderCs();loadMsgs()}
async function loadMsgs(){var cv=cs.find(function(c){return c.id===C})||{};var t=cv.title||'新对话';document.getElementById('ctitle').innerHTML='<span onclick="renameC()" title="点击修改名称">'+esc(t)+'</span>';document.getElementById('sbtn').disabled=false;if(!C)return;var r=await fetch(A+'/conversations/'+C,{headers:{'Authorization':'Bearer '+T}});var d=await r.json();var el=document.getElementById('msgs');if(!d.messages.length){el.innerHTML='<div class="empty-state"><div class="icon">💡</div><div>开始提问</div></div>';return}
el.innerHTML=d.messages.map(function(m){return rMsg(m.role,m.content)}).join('');var cw=document.querySelector('.chat-wrapper');if(cw)cw.scrollTop=cw.scrollHeight;renderDots();}
async function delC(id){if(!confirm('删除此对话？'))return;await fetch(A+'/conversations/'+id,{method:'DELETE',headers:{'Authorization':'Bearer '+T}});cs=cs.filter(function(c){return c.id!==id});if(C===id){C=null;document.getElementById('msgs').innerHTML='<div class="empty-state"><div class="icon">💡</div><div>选择或创建对话</div></div>';document.getElementById('ctitle').innerHTML='<span>新对话</span>';document.getElementById('sbtn').disabled=true}renderCs()}
async function renameC(){if(!C)return;var old=cs.find(function(c){return c.id===C});var n=prompt('修改对话名称',old?old.title:'');if(!n||n.trim()==='')return;var r=await fetch(A+'/conversations/'+C,{method:'PUT',headers:{'Content-Type':'application/json','Authorization':'Bearer '+T},body:JSON.stringify({title:n.trim()})});if(r.ok){old.title=n.trim();document.getElementById('ctitle').innerHTML='<span onclick=\"renameC()\" title=\"点击修改名称\">'+esc(n.trim())+'</span>';renderCs()}}
function renderMd(raw){return marked.parse(raw)}
function rMsg(role,c){var t=renderMd(c);var extra='<div style=\"margin-top:12px;padding-top:10px;border-top:1px solid #f0f0f0\"><button class=\"copy-btn\" onclick=\"copyText(this)\" style=\"position:static;opacity:1;font-size:12px\">📋 复制此回复</button></div>';if(role==='user'){return'<div class=\"msg user\"><div class=\"b\" data-raw=\"'+escAttr(c)+'\">'+t+'</div></div>'}return'<div class=\"msg assistant\"><div class=\"av\">🤖</div><div style=\"flex:1\"><div class=\"b\" data-raw=\"'+escAttr(c)+'\">'+t+'</div>'+extra+'</div></div>'}
function escAttr(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;')}
function copyText(btn){var b=btn.closest('.msg').querySelector('.b');var raw=b.getAttribute('data-raw')||b.textContent;var ta=document.createElement('textarea');ta.value=raw;ta.style.cssText='position:fixed;left:-9999px';document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta);btn.textContent='✅ 已复制';setTimeout(function(){btn.textContent='📋 复制此回复'},1500)}
async function send(){
  var t=document.getElementById('cin').value.trim();if(!t)return;if(!C)await newConv();
  var el=document.getElementById('msgs');if(el.querySelector('.empty-state'))el.innerHTML='';document.getElementById('cin').value='';document.getElementById('sbtn').disabled=true;
  el.insertAdjacentHTML('beforeend',rMsg('user',t));var cw=document.querySelector('.chat-wrapper');if(cw)cw.scrollTop=cw.scrollHeight;
  var hst=await fetch(A+'/conversations/'+C,{headers:{'Authorization':'Bearer '+T}}).then(function(r){return r.json()});var h=hst.messages||[];
var sm='你是文档分析助手，基于文档准确回答。';if(md&&C===docCid){sm+='\n\n用户上传的文档内容：\n'+md.substring(0,30000)}var ms=[{role:'system',content:sm}];
for(var i=0;i<h.length;i++)ms.push(h[i]);ms.push({role:'user',content:t});
  var b=document.createElement('div');b.className='msg assistant';b.innerHTML='<div class=\"av\">🤖</div><div style=\"flex:1\"><div class=\"b\" id=\"streamB\"></div><div style=\"margin-top:10px;padding-top:8px;border-top:1px solid #f0f0f0\"><button class=\"copy-btn\" onclick=\"copyText(this)\" style=\"position:static;opacity:1;font-size:12px\">📋 复制此回复</button></div></div>';el.appendChild(b);var bc=b.querySelector('.b');
  try{
    var r=await fetch(A+'/chat',{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+T},body:JSON.stringify({messages:ms,conversation_id:C})});
    var reader=r.body.getReader(),decoder=new TextDecoder(),buf='',full='',lastRender=0;
    while(true){var x=await reader.read();if(x.done)break;buf+=decoder.decode(x.value,{stream:true});var lines=buf.split('\n');buf=lines.pop()||'';
      for(var li=0;li<lines.length;li++){var line=lines[li];if(!line.startsWith('data: ')||line==='data: [DONE]')continue;try{var d=JSON.parse(line.slice(6));var dt=d.choices?.[0]?.delta?.content||'';if(d.choices?.[0]?.delta?.reasoning_content)dt='';full+=dt}catch(e){}}
      var now=Date.now();if(now-lastRender>100){bc.innerHTML=renderMd(full);lastRender=now;if(cw)cw.scrollTop=cw.scrollHeight}
    }
    bc.innerHTML=renderMd(full);bc.setAttribute('data-raw',full);if(cw)cw.scrollTop=cw.scrollHeight;loadCs();renderDots();
  }catch(e){bc.textContent='❌ '+e.message}document.getElementById('sbtn').disabled=false
}
document.getElementById('fi').addEventListener('change',function(e){if(e.target.files[0])upload(e.target.files[0])});
var ub=document.getElementById('ubox');ub.addEventListener('dragover',function(e){e.preventDefault();ub.style.borderColor='#111';ub.style.background='#fafafa'});ub.addEventListener('dragleave',function(e){e.preventDefault();ub.style.borderColor='#e5e7eb';ub.style.background='#fafbfc'});ub.addEventListener('drop',function(e){e.preventDefault();ub.style.borderColor='#e5e7eb';ub.style.background='#fafbfc';if(e.dataTransfer.files[0])upload(e.dataTransfer.files[0])});
async function upload(f){ub.classList.add('done');ub.textContent=f.name+' ('+(f.size/1024/1024).toFixed(1)+' MB)';document.getElementById('ust').textContent='提交中...';var fd=new FormData();fd.append('file',f);try{var r=await fetch(A+'/parse',{method:'POST',headers:{'Authorization':'Bearer '+T},body:fd});var d=await r.json();document.getElementById('ust').textContent='解析中...';poll=setInterval(function(){ck(d.job_id)},2000)}catch(e){document.getElementById('ust').textContent='提交失败'}}
async function ck(j){var r=await fetch(A+'/parse/'+j,{headers:{'Authorization':'Bearer '+T}});var o=await r.json();if(o.status==='done'){clearInterval(poll);lastJobId=j;localStorage.setItem('lastJobId',j);document.getElementById('ust').textContent='✅ 完成';var r2=await fetch(A+'/parse/'+j+'/download',{headers:{'Authorization':'Bearer '+T}});md=await r2.text();docCid=C;document.getElementById('upv').classList.add('on');document.getElementById('upv').innerHTML=renderMd(md);document.getElementById('ubtns').classList.add('on');if(!C)await newConv();}else if(o.status==='failed'){clearInterval(poll);document.getElementById('ust').textContent='❌ '+(o.error||'失败')}}
function downMd(){var b=new Blob([md],{type:'text/markdown'});var a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='doc.md';a.click()}
function downZip(){fetch(A+'/parse/'+lastJobId+'/download_zip',{headers:{'Authorization':'Bearer '+T}}).then(function(r){return r.blob()}).then(function(b){var a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='result.zip';a.click()})}
function copyMd(){var ta=document.createElement('textarea');ta.value=md;ta.style.cssText='position:fixed;left:-9999px';document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta);document.getElementById('ust').textContent='📋 已复制'}

// Panel resizing
(function(){
  function setupResizer(id, dragSel, otherSel, minD, minO, storageKey, reverse) {
    var r = document.getElementById(id);
    if (!r) return;
    var dragEl = document.querySelector(dragSel);
    var otherEl = document.querySelector(otherSel);
    if (!dragEl || !otherEl) return;

    try {
      var saved = localStorage.getItem(storageKey);
      if (saved) { var w = parseInt(saved); if (w > minD) dragEl.style.width = w + 'px'; }
    } catch(e) {}

    var startX, startW, startOW;

    function onDown(e) {
      startX = e.clientX;
      startW = parseInt(getComputedStyle(dragEl).width);
      startOW = parseInt(getComputedStyle(otherEl).width);
      r.classList.add('active');
      document.body.style.cursor = 'col-resize';
      document.body.style.userSelect = 'none';
      document.addEventListener('mousemove', onMove);
      document.addEventListener('mouseup', onUp);
    }

    function onMove(e) {
      var dx = reverse ? (startX - e.clientX) : (e.clientX - startX);
      var newW = startW + dx;
      var newOW = startOW - dx;
      if (newW < minD) { newW = minD; newOW = startOW - (newW - startW); }
      if (newOW < minO) { newOW = minO; newW = startW + (startOW - newOW); }
      dragEl.style.width = newW + 'px';
      if (!otherEl.classList.contains('main')) otherEl.style.width = newOW + 'px';
    }

    function onUp() {
      r.classList.remove('active');
      document.body.style.cursor = '';
      document.body.style.userSelect = '';
      document.removeEventListener('mousemove', onMove);
      document.removeEventListener('mouseup', onUp);
      try { localStorage.setItem(storageKey, parseInt(getComputedStyle(dragEl).width)); } catch(e) {}
    }

    r.addEventListener('mousedown', onDown);
  }

  setupResizer('resizer1', '.sidebar', '.main', 160, 300, 'psw');
  setupResizer('resizer2', '.right', '.main', 220, 300, 'prw', true);
})();
